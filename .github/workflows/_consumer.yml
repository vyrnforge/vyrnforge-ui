name: Reusable external consumer verification

on:
  workflow_call:
    inputs:
      node-version:
        required: false
        default: "22"
        type: string

permissions:
  contents: read

jobs:
  packed-consumer:
    name: packed-consumer
    runs-on: ubuntu-latest
    timeout-minutes: 35
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm

      - name: Use repository package manager
        run: npm install --global "npm@$(node -p 'require("./package.json").packageManager.split("@").pop()')"

      - name: Install dependencies
        run: npm ci

      - name: Verify packed external consumer
        run: npm run verify:consumer
