name: Reusable browser checks

on:
  workflow_call:
    inputs:
      node-version:
        required: false
        default: "24.18.0"
        type: string

permissions:
  contents: read

jobs:
  chromium-browser:
    name: chromium-browser
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm

      - name: Use repository package manager
        run: npm install --global "npm@$(node -p 'require("./package.json").packageManager.split("@").pop()')"

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium and system dependencies
        run: npx playwright install --with-deps chromium

      - name: Run browser contract tests
        run: npm run test:browser

      - name: Upload browser failure artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-browser-failure-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 7
