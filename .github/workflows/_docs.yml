name: Reusable docs and playground verification

on:
  workflow_call:
    inputs:
      node-version:
        required: false
        default: "24.18.0"
        type: string
      build-docs:
        required: false
        default: false
        type: boolean
      build-playground:
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  documentation-builds:
    name: documentation-builds
    runs-on: ubuntu-latest
    timeout-minutes: 35
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm

      - name: Use repository package manager
        run: npm install --global "npm@$(node -p 'require("./package.json").packageManager.split("@").pop()')"

      - name: Install dependencies
        run: npm ci

      - name: Verify generated repository inventory
        if: inputs['build-docs']
        run: npm run verify:repository-inventory

      - name: Build package prerequisites
        shell: bash
        run: |
          if [[ "${{ inputs['build-playground'] }}" == "true" ]]; then
            npm run build:packages
          elif [[ "${{ inputs['build-docs'] }}" == "true" ]]; then
            npm run build --workspace @vyrnforge/ui-core
            npm run build --workspace @vyrnforge/ui-components
          fi

      - name: Build documentation application
        if: inputs['build-docs']
        run: npm run build --workspace @vyrnforge/ui-docs

      - name: Build playground
        if: inputs['build-playground']
        run: npm run build --workspace @vyrnforge/ui-data-grid-basic-playground
