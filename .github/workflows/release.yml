name: Controlled npm Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Coordinated prerelease version, for example 0.1.0-alpha.2
        required: true
        type: string
      mode:
        description: Verify the candidate or publish it after approval
        required: true
        default: verify
        type: choice
        options:
          - verify
          - publish
      dist-tag:
        description: npm dist-tag for the coordinated prerelease
        required: true
        default: alpha
        type: choice
        options:
          - alpha
          - beta
          - next

permissions:
  contents: read

concurrency:
  group: vyrnforge-npm-release
  cancel-in-progress: false

jobs:
  verify-release:
    name: verify-release
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    env:
      RELEASE_VERSION: ${{ inputs.version }}
      RELEASE_TAG: ${{ inputs.dist-tag }}
      RELEASE_MODE: ${{ inputs.mode }}
      VYRNFORGE_RELEASE_VERSION: ${{ inputs.version }}

    steps:
      - name: Checkout selected commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Confirm current main release candidate
        shell: bash
        run: |
          git fetch origin main --depth=1
          test "$GITHUB_SHA" = "$(git rev-parse origin/main)"

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version-file: .nvmrc
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Use supported npm CLI
        shell: bash
        run: |
          npm install --global "npm@$(node -p 'require("./package.json").packageManager.split("@").pop()')"
          node -e 'const [major, minor] = process.versions.node.split(".").map(Number); if (major !== 24 || minor < 18) process.exit(1)'
          node -e 'const actual = require("child_process").execFileSync("npm", ["--version"], { encoding: "utf8" }).trim(); const expected = require("./package.json").packageManager.split("@").pop(); if (actual !== expected) process.exit(1)'

      - name: Install dependencies
        run: npm ci

      - name: Verify release candidate inputs and registry availability
        run: node scripts/verify-release-candidate.mjs --version "$RELEASE_VERSION" --dist-tag "$RELEASE_TAG"

      - name: Run authoritative release validation
        run: npm run quality

      - name: Verify clean generated-artifact state
        shell: bash
        run: |
          git diff --check
          test -z "$(git status --porcelain --untracked-files=all)"

      - name: Write verification summary
        shell: bash
        run: |
          {
            echo "## VyrnForge npm release verification"
            echo
            echo "- Candidate version: \`$RELEASE_VERSION\`"
            echo "- Dist-tag: \`$RELEASE_TAG\`"
            echo "- Requested mode: \`$RELEASE_MODE\`"
            echo "- Commit: \`$GITHUB_SHA\`"
            echo "- Packages: \`@vyrnforge/ui-core -> @vyrnforge/ui-components -> @vyrnforge/ui-data-grid\`"
            echo "- Internal dependencies: exact \`$RELEASE_VERSION\`"
            echo "- Validation: workflow contracts, metadata, typecheck, tests, package payloads, consumer, docs, and playground passed"
            echo "- Registry: candidate versions are not yet published"
            echo "- Credentials: no token secret used; verification did not request OIDC or publish"
            echo
            echo "### Package dist sizes"
            du -sh packages/ui-core/dist packages/ui-components/dist packages/ui-data-grid/dist
          } >> "$GITHUB_STEP_SUMMARY"

  publish-packages:
    name: publish-packages
    if: inputs.mode == 'publish'
    needs: verify-release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: npm-release
    permissions:
      contents: read
      id-token: write
    env:
      RELEASE_VERSION: ${{ inputs.version }}
      RELEASE_TAG: ${{ inputs.dist-tag }}
      VYRNFORGE_RELEASE_VERSION: ${{ inputs.version }}

    steps:
      - name: Checkout selected commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Confirm current main release candidate
        shell: bash
        run: |
          git fetch origin main --depth=1
          test "$GITHUB_SHA" = "$(git rev-parse origin/main)"

      - name: Setup Node for trusted publishing
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version-file: .nvmrc
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Use supported npm CLI
        shell: bash
        run: |
          npm install --global "npm@$(node -p 'require("./package.json").packageManager.split("@").pop()')"
          node -e 'const [major, minor] = process.versions.node.split(".").map(Number); if (major !== 24 || minor < 18) process.exit(1)'
          node -e 'const actual = require("child_process").execFileSync("npm", ["--version"], { encoding: "utf8" }).trim(); const expected = require("./package.json").packageManager.split("@").pop(); if (actual !== expected) process.exit(1)'

      - name: Install dependencies
        run: npm ci

      - name: Verify release-critical package state
        run: |
          node scripts/verify-release-candidate.mjs --version "$RELEASE_VERSION" --dist-tag "$RELEASE_TAG"
          npm run verify:packages

      - name: Publish ui-core through npm OIDC
        run: npm publish ./packages/ui-core --access public --tag "$RELEASE_TAG"

      - name: Verify ui-core registry propagation
        shell: bash
        run: |
          for attempt in {1..12}; do
            if test "$(npm view "@vyrnforge/ui-core@$RELEASE_VERSION" version --registry=https://registry.npmjs.org 2>/dev/null || true)" = "$RELEASE_VERSION"; then
              exit 0
            fi
            sleep 5
          done
          echo "ui-core publication did not propagate"
          exit 1

      - name: Publish ui-components through npm OIDC
        run: npm publish ./packages/ui-components --access public --tag "$RELEASE_TAG"

      - name: Verify ui-components registry propagation
        shell: bash
        run: |
          for attempt in {1..12}; do
            if test "$(npm view "@vyrnforge/ui-components@$RELEASE_VERSION" version --registry=https://registry.npmjs.org 2>/dev/null || true)" = "$RELEASE_VERSION"; then
              npm view "@vyrnforge/ui-components@$RELEASE_VERSION" dependencies --json --registry=https://registry.npmjs.org | node -e 'let input=""; process.stdin.on("data", chunk => input += chunk).on("end", () => { const dependencies = JSON.parse(input); process.exit(dependencies["@vyrnforge/ui-core"] === process.env.RELEASE_VERSION ? 0 : 1); })'
              exit 0
            fi
            sleep 5
          done
          echo "ui-components publication did not propagate with the expected ui-core dependency"
          exit 1

      - name: Publish ui-data-grid through npm OIDC
        run: npm publish ./packages/ui-data-grid --access public --tag "$RELEASE_TAG"

      - name: Verify ui-data-grid registry propagation and selected dist-tag
        shell: bash
        run: |
          for attempt in {1..12}; do
            if test "$(npm view "@vyrnforge/ui-data-grid@$RELEASE_VERSION" version --registry=https://registry.npmjs.org 2>/dev/null || true)" = "$RELEASE_VERSION"; then
              npm view "@vyrnforge/ui-data-grid@$RELEASE_VERSION" dependencies --json --registry=https://registry.npmjs.org | node -e 'let input=""; process.stdin.on("data", chunk => input += chunk).on("end", () => { const dependencies = JSON.parse(input); process.exit(dependencies["@vyrnforge/ui-core"] === process.env.RELEASE_VERSION && dependencies["@vyrnforge/ui-components"] === process.env.RELEASE_VERSION ? 0 : 1); })'
              for package_name in @vyrnforge/ui-core @vyrnforge/ui-components @vyrnforge/ui-data-grid; do
                npm view "$package_name" dist-tags --json --registry=https://registry.npmjs.org | node -e 'let input=""; process.stdin.on("data", chunk => input += chunk).on("end", () => { const tags = JSON.parse(input); process.exit(tags[process.env.RELEASE_TAG] === process.env.RELEASE_VERSION ? 0 : 1); })'
              done
              exit 0
            fi
            sleep 5
          done
          echo "ui-data-grid publication did not propagate with the expected dependencies and dist-tag"
          exit 1

      - name: Write publication summary
        shell: bash
        run: |
          {
            echo "## VyrnForge npm publication"
            echo
            echo "- Candidate version: \`$RELEASE_VERSION\`"
            echo "- Dist-tag: \`$RELEASE_TAG\`"
            echo "- Commit: \`$GITHUB_SHA\`"
            echo "- Published in order: ui-core, ui-components, ui-data-grid"
            echo "- Registry propagation and exact internal dependencies verified"
            echo "- Credentials: GitHub OIDC trusted publishing only; no token secret used"
            echo "- Provenance: generated automatically by npm trusted publishing"
          } >> "$GITHUB_STEP_SUMMARY"

  verify-registry-release:
    name: verify-registry-release
    if: inputs.mode == 'publish'
    needs: publish-packages
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    env:
      RELEASE_VERSION: ${{ inputs.version }}
      RELEASE_TAG: ${{ inputs.dist-tag }}

    steps:
      - name: Checkout published commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version-file: .nvmrc
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Use repository package manager
        run: npm install --global "npm@$(node -p 'require("./package.json").packageManager.split("@").pop()')"

      - name: Verify registry metadata and fresh consumer
        run: node scripts/verify-registry-release.mjs --version "$RELEASE_VERSION" --dist-tag "$RELEASE_TAG"

      - name: Write registry verification summary
        run: |
          {
            echo "## Registry and consumer verification"
            echo
            echo "- Exact version: \`$RELEASE_VERSION\`"
            echo "- Authoritative prerelease tag: \`$RELEASE_TAG\`"
            echo "- Package metadata and exact dependency graph verified"
            echo "- npm registry signatures and provenance attestations verified"
            echo "- Fresh registry consumer typecheck and production build passed"
            echo "- Any registry-managed \`latest\` tag is informational during prerelease; consumers must use the explicit prerelease tag"
          } >> "$GITHUB_STEP_SUMMARY"

  create-release-record:
    name: create-release-record
    if: inputs.mode == 'publish'
    needs: verify-registry-release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    env:
      RELEASE_VERSION: ${{ inputs.version }}
      RELEASE_TAG: ${{ inputs.dist-tag }}
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout published commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version-file: .nvmrc
          package-manager-cache: false

      - name: Confirm release record does not already exist
        shell: bash
        run: |
          TAG="v$RELEASE_VERSION"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Git tag already exists: $TAG"
            exit 1
          fi
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "GitHub Release already exists: $TAG"
            exit 1
          fi

      - name: Generate release notes
        run: node scripts/create-release-notes.mjs --version "$RELEASE_VERSION" --dist-tag "$RELEASE_TAG" --commit "$GITHUB_SHA" --output release-notes.md

      - name: Create annotated tag and GitHub prerelease
        shell: bash
        run: |
          TAG="v$RELEASE_VERSION"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" "$GITHUB_SHA" -m "VyrnForge UI $RELEASE_VERSION"
          git push origin "$TAG"
          if ! gh release create "$TAG" \
            --target "$GITHUB_SHA" \
            --title "VyrnForge UI $RELEASE_VERSION" \
            --prerelease \
            --notes-file release-notes.md; then
            git push origin ":refs/tags/$TAG" || true
            exit 1
          fi

      - name: Write release-record summary
        run: |
          {
            echo "## GitHub release record"
            echo
            echo "- Tag: \`v$RELEASE_VERSION\`"
            echo "- GitHub Release: created as prerelease"
            echo "- Permission separation: this job has repository write access and no npm OIDC permission"
          } >> "$GITHUB_STEP_SUMMARY"
