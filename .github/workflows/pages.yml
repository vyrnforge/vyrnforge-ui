name: Deploy GitHub Pages

on:
  workflow_run:
    workflows: ["VyrnForge CI"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    name: build-pages
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    permissions:
      contents: read

    steps:
      - name: Checkout verified main commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 0

      - name: Reject stale or non-main deployment candidates
        shell: bash
        run: |
          git fetch origin main --depth=1
          test "$(git rev-parse HEAD)" = "$(git rev-parse origin/main)"

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Use repository package manager
        run: npm install --global "npm@$(node -p 'require("./package.json").packageManager.split("@").pop()')"

      - name: Install dependencies
        run: npm ci

      - name: Verify public metadata
        run: npm run verify:metadata

      - name: Build packages
        run: npm run build:packages

      - name: Build docs
        run: npm run build --workspace @vyrnforge/ui-docs
        env:
          VITE_BASE_PATH: /vyrnforge-ui/

      - name: Build playground
        run: npm run build --workspace @vyrnforge/ui-data-grid-basic-playground
        env:
          VITE_BASE_PATH: /vyrnforge-ui/playground/

      - name: Assemble Pages artifact
        shell: bash
        run: |
          rm -rf site
          mkdir -p site/playground
          cp -R apps/docs/dist/. site/
          cp -R examples/basic-playground/dist/. site/playground/
          touch site/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: site

  deploy:
    name: deploy-pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
