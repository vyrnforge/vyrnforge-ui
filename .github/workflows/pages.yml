name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build packages
        run: npm run build:packages

      - name: Build docs
        run: npm run build:docs
        env:
          VITE_BASE_PATH: /vyrnforge-ui/

      - name: Build playground
        run: npm run build:playground
        env:
          VITE_BASE_PATH: /vyrnforge-ui/playground/

      - name: Assemble Pages artifact
        shell: bash
        run: |
          rm -rf site
          mkdir -p site/playground

          cp -R apps/docs/dist/. site/
          cp -R examples/basic-playground/dist/. site/playground/

          touch site/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    permissions:
      pages: write
      id-token: write

    steps:
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
