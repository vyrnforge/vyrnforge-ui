name: Bug report
description: Report a reproducible VyrnForge UI defect.
title: "[Bug]: "
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve VyrnForge UI. Do not report security vulnerabilities here; use SECURITY.md and private reporting instead.
  - type: input
    id: affected-area
    attributes:
      label: Affected package or component
      description: Name the package, component, or area involved.
      placeholder: "@vyrnforge/ui-components Button"
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Package version or commit
      placeholder: "0.1.0 or commit SHA"
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Provide the smallest steps or example that reproduces the issue.
      placeholder: "1. Render...\n2. Click...\n3. Observe..."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Browser and environment
      placeholder: "Chrome 126, Windows 11, React 19"
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Screenshots or reproduction links
      description: Add screenshots, repository links, or a minimal reproduction when useful. Do not include secrets or customer data.
  - type: textarea
    id: accessibility-impact
    attributes:
      label: Accessibility impact
      description: Describe keyboard, focus, screen-reader, contrast, or motion impact if relevant.
